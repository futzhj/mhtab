name: Build mhtabx

on:
  push:
    branches: [ main, master, dev ]
    paths:
      - 'rebuild/**'
      - '.github/workflows/build.yml'
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'rebuild/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write   # 创建 Release 需要

jobs:
  build:
    name: Build (${{ matrix.config }} ${{ matrix.arch }})
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        config: [Release, Debug]
        arch: [x64]
        include:
          - arch: x64
            cmake_arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Show tool versions
        shell: pwsh
        run: |
          cmake --version
          cl.exe /Bv 2>&1 | Select-Object -First 3

      - name: Configure CMake
        shell: pwsh
        working-directory: rebuild
        run: |
          cmake -B build -A ${{ matrix.cmake_arch }} `
            -G "Visual Studio 17 2022" `
            -DCMAKE_BUILD_TYPE=${{ matrix.config }}

      - name: Build
        shell: pwsh
        working-directory: rebuild
        run: |
          cmake --build build --config ${{ matrix.config }} --parallel

      - name: Verify binaries
        shell: pwsh
        working-directory: rebuild/build/bin/${{ matrix.config }}
        run: |
          Get-ChildItem
          if (-not (Test-Path "mhtabx.exe")) { throw "mhtabx.exe not produced" }
          if (-not (Test-Path "demo_child.exe")) { throw "demo_child.exe not produced" }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mhtabx-${{ matrix.config }}-${{ matrix.arch }}
          path: |
            rebuild/build/bin/${{ matrix.config }}/mhtabx.exe
            rebuild/build/bin/${{ matrix.config }}/demo_child.exe
            rebuild/build/bin/${{ matrix.config }}/*.pdb
          retention-days: 30
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: windows-2022
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Release artifact
        uses: actions/download-artifact@v4
        with:
          name: mhtabx-Release-x64
          path: release/

      - name: Package zip
        shell: pwsh
        working-directory: release
        run: |
          $ver = "${{ github.ref_name }}"
          Compress-Archive -Path mhtabx.exe,demo_child.exe `
            -DestinationPath "mhtabx-$ver-win-x64.zip"
          Get-ChildItem

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
